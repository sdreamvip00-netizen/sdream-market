<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDREAM SERVICES | PREMIUM DEV HUB</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background: #050505; color: #eee; font-family: 'JetBrains Mono', monospace; margin: 0; overflow-x: hidden; }
        .bg-gif { position: fixed; inset: 0; z-index: -1; background: url('gif1.gif') center/cover no-repeat; filter: blur(45px) brightness(0.2); }
        .glass { background: rgba(15,15,15,0.7); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); }
        .hidden { display: none; }
        .btn-glow:hover { box-shadow: 0 0 15px #3b82f6; transform: translateY(-2px); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #333; }
        .service-card { transition: 0.3s; border: 1px solid rgba(255,255,255,0.03); }
        .service-card:hover { border-color: #3b82f6; background: rgba(59,130,246,0.05); }
    </style>
</head>
<body>
<div class="bg-gif"></div>

<!-- Auth -->
<div id="auth-screen" class="fixed inset-0 z-50 flex items-center justify-center p-4">
    <div class="glass p-8 w-full max-w-md rounded-2xl shadow-2xl">
        <h1 class="text-3xl font-bold text-blue-500 mb-2 tracking-tighter">SDREAM SERVICES</h1>
        <p class="text-xs text-neutral-500 mb-6 font-bold uppercase tracking-widest">Dev Marketplace Access</p>
        <div class="space-y-4">
            <input id="auth-user" type="text" placeholder="Username" class="w-full bg-black/50 border border-white/10 p-4 rounded-xl outline-none focus:border-blue-500 transition">
            <input id="auth-pass" type="password" placeholder="Password" class="w-full bg-black/50 border border-white/10 p-4 rounded-xl outline-none focus:border-blue-500 transition">
            <button onclick="handleLogin()" class="w-full bg-blue-600 p-4 rounded-xl font-bold btn-glow transition uppercase text-sm">Sign In</button>
            <button onclick="handleRegister()" class="w-full text-xs text-neutral-500 hover:text-white uppercase font-bold tracking-widest">Create Identity</button>
        </div>
        <p id="auth-error" class="text-red-500 text-[10px] mt-4 text-center font-bold"></p>
    </div>
</div>

<!-- Main -->
<div id="app" class="hidden min-h-screen flex flex-col">
    <nav class="p-6 glass m-4 rounded-2xl flex justify-between items-center">
        <div>
            <span class="text-xl font-bold text-blue-500 tracking-tighter">SDREAM</span>
            <span class="text-[10px] bg-blue-600/20 text-blue-400 px-2 py-1 rounded ml-2">VERIFIED</span>
        </div>
        <div class="flex items-center gap-6">
            <span id="user-display" class="text-xs font-bold opacity-50"></span>
            <button onclick="location.reload()" class="text-xs text-red-500 font-bold uppercase">Logout</button>
        </div>
    </nav>

    <main class="p-4 max-w-7xl mx-auto w-full grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="services">
        <!-- Servisler -->
    </main>

    <!-- Chat -->
    <div id="chat-box" class="fixed bottom-6 right-6 w-80 md:w-96 glass h-[500px] flex flex-col hidden rounded-2xl shadow-2xl overflow-hidden border-blue-500/20">
        <div class="p-4 bg-blue-600 flex justify-between items-center">
            <span class="text-xs font-bold tracking-widest">SUPPORT_CHANNEL.EXE</span>
            <button onclick="closeChat()">✕</button>
        </div>
        <div id="chat-msgs" class="flex-grow p-4 overflow-y-auto space-y-4 text-xs bg-black/40"></div>
        <div class="p-4 border-t border-white/5 flex gap-2">
            <input id="chat-input" type="text" placeholder="Type message..." class="flex-grow bg-black/50 border border-white/10 p-3 rounded-lg outline-none text-xs">
            <button onclick="sendMsg()" class="bg-blue-600 px-4 rounded-lg">></button>
        </div>
    </div>
</div>

<script>
-- sdreamvip0
const firebaseConfig = JSON.parse(__firebase_config);
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const appId = typeof __app_id !== 'undefined' ? __app_id : 'sdream-main';

let user = null;
let activeChat = null;

const DATA = [
    { n: 'Bot Development', img: 'https://images.unsplash.com/photo-1550751827-4bd374c3f58b?w=400', p: [{t:'Entry', v:'$15'}, {t:'Mid', v:'$45'}, {t:'High-End', v:'$120+'}] },
    { n: 'Roblox Dev', img: 'https://images.unsplash.com/photo-1614850523296-d8c1af93d400?w=400', p: [{t:'Entry', v:'$20'}, {t:'Mid', v:'$75'}, {t:'High-End', v:'$200+'}] },
    { n: 'Video Editing', img: 'https://images.unsplash.com/photo-1574717024653-61fd2cf4d44d?w=400', p: [{t:'Shorts', v:'$10'}, {t:'Mid', v:'$40'}, {t:'High-End', v:'$100+'}] },
    { n: 'GFX Design', img: 'https://images.unsplash.com/photo-1626785774573-4b799315345d?w=400', p: [{t:'Entry', v:'$15'}, {t:'Mid', v:'$35'}, {t:'High-End', v:'$80'}] },
    { n: 'Web Design', img: 'https://images.unsplash.com/photo-1547658719-da2b51169166?w=400', p: [{t:'Entry', v:'$50'}, {t:'Mid', v:'$150'}, {t:'High-End', v:'$400+'}] }
];

async function handleRegister() {
    const u = document.getElementById('auth-user').value.trim().toLowerCase();
    const p = document.getElementById('auth-pass').value;
    const e = document.getElementById('auth-error');
    if(u.length < 3) return e.innerText = "NAME_TOO_SHORT";
    
    const doc = await db.doc(`/artifacts/${appId}/public/data/users/${u}`).get();
    if(doc.exists()) return e.innerText = "ALREADY_TAKEN";

    await db.doc(`/artifacts/${appId}/public/data/users/${u}`).set({ u, p, r: u === 'sdreamvip' ? 'admin' : 'user' });
    init(u);
}

async function handleLogin() {
    const u = document.getElementById('auth-user').value.trim().toLowerCase();
    const p = document.getElementById('auth-pass').value;
    const e = document.getElementById('auth-error');

    const doc = await db.doc(`/artifacts/${appId}/public/data/users/${u}`).get();
    if(!doc.exists() || doc.data().p !== p) return e.innerText = "INVALID_CREDENTIALS";
    init(u);
}

function init(u) {
    user = u;
    document.getElementById('auth-screen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    document.getElementById('user-display').innerText = `@${u.toUpperCase()}`;
    loadGrid();
}

function loadGrid() {
    document.getElementById('services').innerHTML = DATA.map(s => `
        <div class="glass p-4 rounded-2xl service-card">
            <img src="${s.img}" class="w-full h-32 object-cover rounded-xl opacity-50 mb-4">
            <h3 class="font-bold text-sm mb-4 border-l-2 border-blue-500 pl-2">${s.n.toUpperCase()}</h3>
            <div class="space-y-2">
                ${s.p.map(o => `
                    <button onclick="order('${s.n}', '${o.t}', '${o.v}')" class="w-full flex justify-between p-3 bg-white/5 rounded-lg hover:bg-blue-600/20 transition text-[10px] font-bold">
                        <span>${o.t}</span>
                        <span class="text-blue-500">${o.v}</span>
                    </button>
                `).join('')}
            </div>
        </div>
    `).join('');
}

async function order(service, tier, price) {
    activeChat = user === 'sdreamvip' ? activeChat : user;
    document.getElementById('chat-box').classList.remove('hidden');
    
    if (user !== 'sdreamvip') {
        const txt = `[ORDER] User @${user} wants ${service} (${tier}) for ${price}.`;
        await db.collection(`/artifacts/${appId}/public/data/chats/${user}/msgs`).add({ s: 'System', t: txt, time: Date.now() });
    }
    listen(activeChat || user);
}

async function sendMsg() {
    const i = document.getElementById('chat-input');
    if(!i.value || !activeChat) return;
    await db.collection(`/artifacts/${appId}/public/data/chats/${activeChat}/msgs`).add({ s: user, t: i.value, time: Date.now() });
    i.value = '';
}

function listen(c) {
    activeChat = c;
    db.collection(`/artifacts/${appId}/public/data/chats/${c}/msgs`).orderBy('time').onSnapshot(s => {
        document.getElementById('chat-msgs').innerHTML = s.docs.map(d => {
            const m = d.data();
            const isMe = m.s === user;
            return `<div class="${isMe ? 'text-right' : 'text-left'}">
                <div class="text-[8px] text-neutral-600 mb-1 uppercase">${m.s}</div>
                <div class="inline-block p-2 rounded-lg ${isMe ? 'bg-blue-600' : 'bg-neutral-800'}">${m.text || m.t}</div>
            </div>`;
        }).join('');
        const div = document.getElementById('chat-msgs');
        div.scrollTop = div.scrollHeight;
    });
}

function closeChat() { document.getElementById('chat-box').classList.add('hidden'); }

firebase.auth().signInAnonymously();
</script>
</body>
</html>
